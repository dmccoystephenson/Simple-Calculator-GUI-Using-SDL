name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev

      # Builds all three frontends/targets via the Makefile (SDL GUI, text CLI,
      # and the test runner), each linking the shared CalculatorEngine — this
      # is the first place simpleCalculator.cpp is compiled and linked against
      # SDL2. CI overrides CXXFLAGS to add -Werror so new warnings fail the
      # build, while a local `make` stays non-fatal (Makefile keeps -Wall -Wextra).
      - name: Build (Makefile)
        run: make CXXFLAGS="-std=c++17 -Wall -Wextra -Werror"

      # Runs the engine + parser assert-based test suite; a failing assertion
      # aborts with a non-zero status and fails the job.
      - name: Run engine tests
        run: ./testingParsing

      # End-to-end check of the text frontend driving the shared engine.
      - name: Smoke-test the text frontend
        run: |
          printf '12+3=\n2*3+4=\nq\n' | ./textCalculator | tee /tmp/out
          grep -q '= 15' /tmp/out
          grep -q '= 10' /tmp/out
